name: Backend Tests

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip==24.0

      - name: Install PyTorch CPU wheels
        run: |
          python -m pip install torch==2.5.1 torchaudio==2.5.1 torchvision==0.20.1 --index-url https://download.pytorch.org/whl/cpu

      - name: Install IndicTrans toolkit
        run: |
          python -m pip install git+https://github.com/VarunGumma/IndicTransToolkit.git

      - name: Install backend dependencies
        run: |
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run backend unit tests
        env:
          HF_TOKEN: test-token
        run: python -m unittest discover -s tests -v